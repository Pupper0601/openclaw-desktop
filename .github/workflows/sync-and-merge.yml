name: 同步与合并

on:
  repository_dispatch:
    types: [upstream-updates-available]

jobs:
  sync:
    name: 同步上游更新
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: 配置Git用户
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'

      - name: 添加上游远程仓库
        run: |
          git remote add upstream https://github.com/rshodoskar-star/openclaw-desktop.git || true
          git fetch upstream

      - name: 尝试合并上游更新
        id: merge
        run: |
          # 检查是否已经是最新
          git fetch upstream
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "✅ 已经是最新版本，无需合并"
            echo "status=already_uptodate" >> $GITHUB_OUTPUT
          else
            # 尝试直接合并（保留这个简单路径）
            if git merge upstream/master --no-edit 2>&1; then
              echo "✅ 自动合并成功"
              echo "status=success" >> $GITHUB_OUTPUT
              git push origin HEAD
            else
              echo "🔄 自动合并失败，存在冲突，需要人工确认"
              echo "status=failed" >> $GITHUB_OUTPUT
              # 保留合并状态，不执行 abort
              echo "保留合并状态，准备创建PR分支"
            fi
          fi

      - name: 触发构建工作流（合并成功时）
        if: steps.merge.outputs.status == 'success'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          event-type: build-trigger
          client-payload: |
            {
              "merge_status": "success",
              "triggered_by": "sync-and-merge"
            }

      - name: 创建新分支并推送（合并失败时）
        if: steps.merge.outputs.status == 'failed'
        run: |
          echo "开始创建包含冲突的分支..."
          # 检查是否处于合并状态
          if [ -f ".git/MERGE_HEAD" ]; then
            echo "当前处于合并状态，直接创建分支"
            # 创建新分支，保留合并状态
            git checkout -b merge-upstream-updates
          else
            echo "警告：不在合并状态，尝试重新创建合并"
            git merge --abort || true
            git reset --hard HEAD
            git checkout -b merge-upstream-updates
            git merge upstream/master --no-edit || echo "重新合并失败"
          fi
          # 显示状态
          git status
          git log --oneline -3
          # 强制推送分支
          git push origin merge-upstream-updates --force
          echo "分支已推送"

      - name: 创建PR（合并失败时）
        if: steps.merge.outputs.status == 'failed'
        run: |
          echo "开始创建PR..."
          # 检查是否存在分支差异（有冲突或提交）
          git fetch origin master
          DIFF_COUNT=$(git rev-list --count origin/master..merge-upstream-updates 2>/dev/null || echo "0")
          echo "差异提交数: $DIFF_COUNT"
          
          # 检查是否有未完成的合并
          if [ -f ".git/MERGE_HEAD" ] || [ "$DIFF_COUNT" -gt "0" ]; then
            echo "检测到未完成的合并或提交，创建PR..."
            gh pr create \
              --base master \
              --head merge-upstream-updates \
              --title "上游更新合并请求" \
              --body "检测到上游仓库有更新，但自动合并时遇到冲突，需要人工确认。

**上游提交**: ${{ github.event.client_payload.upstream_commit }}
**本地提交**: ${{ github.event.client_payload.local_commit }}

请检查并解决冲突后合并此PR。"
            echo "PR创建成功"
          else
            echo "警告：分支与master没有差异，可能不需要创建PR"
            echo "跳过PR创建"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT }}

      - name: 总结
        run: |
          echo "## 同步结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.merge.outputs.status }}" = "success" ]; then
            echo "### ✅ 自动合并成功" >> $GITHUB_STEP_SUMMARY
            echo "已成功将上游更新合并到当前分支，并触发了构建工作流。" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge.outputs.status }}" = "no_changes" ]; then
            echo "### ✅ 没有实际更改" >> $GITHUB_STEP_SUMMARY
            echo "上游更新已合并，但没有实际代码更改，直接触发构建。" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge.outputs.status }}" = "already_uptodate" ]; then
            echo "### ✅ 已经是最新版本" >> $GITHUB_STEP_SUMMARY
            echo "当前分支已与上游保持同步，无需操作。" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🔄 需要人工确认" >> $GITHUB_STEP_SUMMARY
            echo "自动合并遇到冲突，已创建PR等待人工确认。" >> $GITHUB_STEP_SUMMARY
            echo "请查看并解决冲突后合并PR，构建将自动进行。" >> $GITHUB_STEP_SUMMARY
          fi
