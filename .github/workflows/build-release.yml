name: 构建发布

on:
  repository_dispatch:
    types: [build-trigger]
  workflow_dispatch:  # 手动触发构建

jobs:
  check-translation:
    name: 检查翻译需求
    runs-on: ubuntu-latest
    outputs:
      translation_needed: ${{ steps.check.outputs.translation_needed }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查翻译文件是否有更改
        id: check
        run: |
          # 尝试获取父提交（对于合并提交，使用第一个父提交）
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            PREVIOUS="HEAD^1"
          else
            PREVIOUS="HEAD~1"
          fi
          # 检查 src/locales/ 目录下的文件是否有更改
          CHANGED=$(git diff --name-only $PREVIOUS HEAD -- src/locales/ 2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "🔄 检测到翻译文件有更改，需要更新翻译"
            echo "translation_needed=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 翻译文件无更改，无需翻译"
            echo "translation_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: 输出结果
        run: |
          echo "翻译需求: ${{ steps.check.outputs.translation_needed }}"

  translate:
    name: 更新翻译
    runs-on: ubuntu-latest
    needs: check-translation
    if: needs.check-translation.outputs.translation_needed == 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行翻译脚本
        run: |
          # 这里假设存在翻译脚本，例如 npm run translate
          # 如果不存在，请用户自定义此步骤
          if grep -q '"translate"' package.json; then
            npm run translate
          else
            echo "⚠️ 未找到翻译脚本，请手动处理翻译更新"
          fi

      - name: 提交翻译更新
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/locales/
          git commit -m "更新翻译" || echo "没有更改可提交"
          git push origin HEAD

  build-windows:
    name: 构建Windows版本
    runs-on: windows-latest
    needs: check-translation
    if: always() && (needs.check-translation.result == 'success')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建应用
        run: npm run build

      - name: 构建Windows安装程序
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传Windows构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-macos:
    name: 构建macOS版本
    runs-on: macos-latest
    needs: check-translation
    if: always() && (needs.check-translation.result == 'success')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建应用
        run: npm run build

      - name: 构建macOS安装程序
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传macOS构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/*.dmg

  create-release:
    name: 创建发布
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: github.event_name == 'repository_dispatch' && github.event.client_payload.merge_status == 'success'
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}