name: 合并上游更新

on:
  repository_dispatch:
    types: [上游更新可用]
  workflow_dispatch:
    inputs:
      上游提交:
        description: '上游提交哈希（可选）'
        required: false
        type: string

jobs:
  合并上游:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      状态: ${{ steps.合并.outputs.状态 }}
      有冲突: ${{ steps.合并.outputs.有冲突 }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: 配置Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/rshodoskar-star/openclaw-desktop || true
          git fetch upstream

      - name: 合并上游更新
        id: 合并
        run: |
          # 检查是否已是最新
          本地提交=$(git rev-parse HEAD)
          上游提交=${{ github.event.client_payload.上游提交 || github.event.inputs.上游提交 || 'upstream/master' }}
          
          if [ "$本地提交" = "$上游提交" ]; then
            echo "状态=已是最新" >> $GITHUB_OUTPUT
            echo "✅ 已经是最新版本"
            exit 0
          fi

          # 尝试合并
          if git merge upstream/master --no-edit; then
            echo "状态=成功" >> $GITHUB_OUTPUT
            echo "有冲突=false" >> $GITHUB_OUTPUT
            echo "✅ 自动合并成功"
            
            # 获取合并的提交信息
            上游消息=$(git log upstream/master -1 --pretty=format:"%s")
            echo "上游消息=$上游消息" >> $GITHUB_OUTPUT
            
            git push origin HEAD
          else
            echo "状态=失败" >> $GITHUB_OUTPUT
            echo "有冲突=true" >> $GITHUB_OUTPUT
            echo "🔄 自动合并失败，存在冲突"
            
            # 创建冲突分支
            git checkout -b upstream-merge-conflict-$(date +%Y%m%d-%H%M%S)
            git push origin HEAD
          fi

      - name: 检查翻译文件变更
        if: steps.合并.outputs.状态 == '成功'
        id: 检查翻译
        run: |
          # 检查 en.json 是否有变更
          if git diff HEAD^1 HEAD --name-only | grep -q "src/locales/en.json"; then
            echo "有变更=true" >> $GITHUB_OUTPUT
            echo "📝 检测到翻译文件有更新"
          else
            echo "有变更=false" >> $GITHUB_OUTPUT
            echo "✅ 翻译文件无变更"
          fi

      - name: 设置Node.js
        if: steps.检查翻译.outputs.有变更 == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        if: steps.检查翻译.outputs.有变更 == 'true'
        run: npm ci

      - name: 自动翻译新增内容
        if: steps.检查翻译.outputs.有变更 == 'true'
        env:
          BAIDU_API_KEY: 0D5P_d73tjvrb1hv2c1drokfg
        run: |
          # 创建自动翻译脚本
          cat > scripts/auto-translate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          
          const enPath = path.join(__dirname, '../src/locales/en.json');
          const zhPath = path.join(__dirname, '../src/locales/zh.json');
          
          console.log('🔍 检查需要翻译的新增内容...\n');
          
          // 读取文件
          const en = JSON.parse(fs.readFileSync(enPath, 'utf8'));
          const zh = JSON.parse(fs.readFileSync(zhPath, 'utf8'));
          
          // 查找缺失的键
          function findMissingKeys(source, target, prefix = '') {
            const missing = [];
            for (const key in source) {
              const fullPath = prefix ? `${prefix}.${key}` : key;
              if (!(key in target)) {
                missing.push({ path: fullPath, value: source[key] });
              } else if (typeof source[key] === 'object' && source[key] !== null && !Array.isArray(source[key])) {
                missing.push(...findMissingKeys(source[key], target[key] || {}, fullPath));
              }
            }
            return missing;
          }
          
          // 百度翻译API
          async function translateText(text) {
            return new Promise((resolve, reject) => {
              if (typeof text !== 'string') {
                resolve(text);
                return;
              }
              
              const appid = '20230308001588888';
              const key = process.env.BAIDU_API_KEY;
              const salt = Date.now().toString();
              const str = appid + text + salt + key;
              const crypto = require('crypto');
              const sign = crypto.createHash('md5').update(str).digest('hex');
              
              const query = new URLSearchParams({
                q: text,
                from: 'en',
                to: 'zh',
                appid: appid,
                salt: salt,
                sign: sign
              }).toString();
              
              const options = {
                hostname: 'fanyi-api.baidu.com',
                port: 443,
                path: '/api/trans/vip/translate?' + query,
                method: 'GET'
              };
              
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  try {
                    const result = JSON.parse(data);
                    if (result.error_code) {
                      console.warn(`⚠️ 翻译失败: ${result.error_msg}，使用原文`);
                      resolve(text);
                    } else {
                      resolve(result.trans_result[0].dst);
                    }
                  } catch (e) {
                    console.warn(`⚠️ 翻译解析失败，使用原文: ${text}`);
                    resolve(text);
                  }
                });
              });
              
              req.on('error', (err) => {
                console.warn(`⚠️ 翻译请求失败: ${err.message}，使用原文`);
                resolve(text);
              });
              
              req.end();
            });
          }
          
          // 更新JSON对象
          function updateJson(obj, path, value) {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) {
              if (!current[keys[i]]) current[keys[i]] = {};
              current = current[keys[i]];
            }
            current[keys[keys.length - 1]] = value;
          }
          
          // 主流程
          async function main() {
            const missingKeys = findMissingKeys(en, zh);
            
            if (missingKeys.length === 0) {
              console.log('✅ 没有需要翻译的新增内容');
              return;
            }
            
            console.log(`📝 发现 ${missingKeys.length} 个需要翻译的键\n`);
            
            // 创建zh.json的副本
            const updatedZh = JSON.parse(JSON.stringify(zh));
            
            // 为每个缺失的键添加翻译
            for (const item of missingKeys) {
              const translatedValue = typeof item.value === 'string' 
                ? await translateText(item.value)
                : item.value;
              
              updateJson(updatedZh, item.path, translatedValue);
              console.log(`  + ${item.path}`);
            }
            
            // 写回文件
            fs.writeFileSync(zhPath, JSON.stringify(updatedZh, null, 2) + '\n', 'utf8');
            console.log('\n✅ 翻译完成，已更新 zh.json');
          }
          
          main().catch(err => {
            console.error('❌ 翻译过程出错:', err);
            process.exit(1);
          });
          EOF
          
          # 运行翻译脚本
          node scripts/auto-translate.js

      - name: 提交翻译更新
        if: steps.检查翻译.outputs.有变更 == 'true'
        run: |
          git add src/locales/zh.json
          git commit -m "自动翻译: 更新中文翻译文件" || echo "没有更改可提交"
          git push origin HEAD

      - name: 发送冲突通知
        if: steps.合并.outputs.有冲突 == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `## ⚠️ 上游合并冲突需要手动解决
            
            检测到上游更新合并冲突，需要手动解决。
            
            **仓库**: ${context.repo.owner}/${context.repo.repo}
            **工作流运行**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            
            请查看PR并解决冲突。`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `上游合并冲突 - ${new Date().toLocaleDateString('zh-CN')}`,
              body: issueBody,
              labels: ['conflict', 'upstream', 'manual-required']
            });

      - name: 创建冲突PR
        if: steps.合并.outputs.有冲突 == 'true'
        run: |
          gh pr create \
            --base master \
            --head $(git branch --show-current) \
            --title "上游更新合并冲突解决" \
            --body "自动合并上游更新时检测到冲突，需要手动解决。"
        env:
          GH_TOKEN: ${{ secrets.PAT }}

      - name: 触发构建工作流
        if: steps.合并.outputs.状态 == '成功'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          event-type: 构建触发
          client-payload: |
            {
              "合并状态": "成功",
              "触发源": "上游合并",
              "需要发布": "true"
            }

      - name: 生成报告
        run: |
          echo "## 合并结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.合并.outputs.状态 }}" = "成功" ]; then
            echo "### ✅ 自动合并成功" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.检查翻译.outputs.有变更 }}" = "true" ]; then
              echo "📝 已自动翻译并更新中文翻译文件。" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "${{ steps.合并.outputs.状态 }}" = "已是最新" ]; then
            echo "### ✅ 已经是最新版本" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ 需要手动解决冲突" >> $GITHUB_STEP_SUMMARY
            echo "已创建PR等待手动解决。" >> $GITHUB_STEP_SUMMARY
          fi
