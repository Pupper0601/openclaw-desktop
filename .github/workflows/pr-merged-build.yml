name: PR合并后构建

on:
  pull_request:
    types: [closed]
    branches: [ master, main ]

jobs:
  build-after-pr:
    name: PR合并后构建
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 触发构建工作流
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          event-type: build-trigger
          client-payload: |
            {
              "merge_status": "pr_merged",
              "triggered_by": "pr-merged",
              "pr_number": "${{ github.event.pull_request.number }}"
            }

      - name: 总结
        run: |
          echo "## ✅ PR已合并，构建已触发" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PR #${{ github.event.pull_request.number }} 已成功合并，构建工作流已触发。" >> $GITHUB_STEP_SUMMARY
